<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="Velora">
  <style>
    .v-mark { fill: #171717; }
    @media (prefers-color-scheme: dark) { .v-mark { fill: #F5F1E8; } }
  </style>
  <!-- Буква V: серифный знак с контрастом штрихов (толстая левая диагональ, тонкая правая) -->
  <g class="v-mark">
    <rect x="15" y="20.5" width="32" height="3.3"/>
    <rect x="62" y="20.5" width="23" height="3.3"/>
    <polygon points="19,23 43,23 51,58 66,23 81,23 51,84"/>
  </g>
  <!-- Золотая точка -->
  <circle cx="75" cy="75" r="9.5" fill="#C9A24D"/>
</svg>
