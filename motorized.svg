  </linearGradient>
  <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#FBF4E2" stop-opacity="0.9"/><stop offset="1" stop-color="#FBF4E2" stop-opacity="0"/>
  </linearGradient>
  <filter id="blur"><feGaussianBlur stdDeviation="8"/></filter>
</defs>

